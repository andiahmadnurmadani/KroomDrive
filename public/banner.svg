<svg viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1035"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4318FF"/>
      <stop offset="100%" style="stop-color:#7b5cff"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle glow for logo -->
    <filter id="logoGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Accent glow blobs -->
  <circle cx="120" cy="200" r="180" fill="#4318FF" opacity="0.08"/>
  <circle cx="1100" cy="100" r="150" fill="#7b5cff" opacity="0.06"/>
  <circle cx="650" cy="350" r="120" fill="#4318FF" opacity="0.05"/>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="3" fill="url(#accentGrad)"/>

  <!-- Logo (centered left area) -->
  <g transform="translate(140, 120) scale(2.0)" filter="url(#logoGlow)">
    <mask id="eye-mask-banner">
      <rect x="0" y="0" width="100" height="80" fill="white"/>
      <circle cx="18" cy="40" r="4" fill="black"/>
    </mask>
    <g mask="url(#eye-mask-banner)" fill="#4318FF">
      <rect x="0" y="0" width="45" height="80" rx="22.5"/>
      <path d="M55 36V0H100C100 0 100 36 55 36Z"/>
      <path d="M55 44V80H100C100 80 100 44 55 44Z"/>
    </g>
  </g>

  <!-- KroomDrive wordmark -->
  <text x="395" y="195" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="72" font-weight="700" fill="white" letter-spacing="-2" filter="url(#glow)">
    Kroom<tspan fill="#4318FF">Drive</tspan>
  </text>

  <!-- Tagline -->
  <text x="397" y="245" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="22" font-weight="400" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">
    Self-hosted · Multi-user · SSH File Manager
  </text>

  <!-- Feature pills -->
  <g transform="translate(397, 280)">
    <!-- SSH/SFTP pill -->
    <rect x="0" y="0" width="110" height="32" rx="16" fill="#4318FF" opacity="0.25"/>
    <rect x="0" y="0" width="110" height="32" rx="16" stroke="#4318FF" stroke-width="1" fill="none"/>
    <text x="55" y="21" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600"
          fill="#a78bff" text-anchor="middle" letter-spacing="0.3">SSH / SFTP</text>

    <!-- Git pill -->
    <rect x="120" y="0" width="80" height="32" rx="16" fill="#4318FF" opacity="0.25"/>
    <rect x="120" y="0" width="80" height="32" rx="16" stroke="#4318FF" stroke-width="1" fill="none"/>
    <text x="160" y="21" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600"
          fill="#a78bff" text-anchor="middle" letter-spacing="0.3">Git Panel</text>

    <!-- Multi-user pill -->
    <rect x="210" y="0" width="115" height="32" rx="16" fill="#4318FF" opacity="0.25"/>
    <rect x="210" y="0" width="115" height="32" rx="16" stroke="#4318FF" stroke-width="1" fill="none"/>
    <text x="267" y="21" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600"
          fill="#a78bff" text-anchor="middle" letter-spacing="0.3">Multi-User</text>

    <!-- Cloudflare pill -->
    <rect x="335" y="0" width="145" height="32" rx="16" fill="#f97316" opacity="0.18"/>
    <rect x="335" y="0" width="145" height="32" rx="16" stroke="#f97316" stroke-width="1" fill="none" opacity="0.6"/>
    <text x="407" y="21" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="600"
          fill="#fdba74" text-anchor="middle" letter-spacing="0.3">CF Tunnel</text>
  </g>

  <!-- KroomBox branding bottom right -->
  <text x="1165" y="375" font-family="'Segoe UI', Arial, sans-serif" font-size="14"
        fill="rgba(255,255,255,0.3)" text-anchor="end" font-weight="500">
    by KroomBox · kroombox.com
  </text>
</svg>
