<svg viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- ============ GRADIENTS & FILTERS ============ -->
  <defs>
    <!-- Background gradient (darker, richer) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a15"/>
      <stop offset="50%" style="stop-color:#120f24"/>
      <stop offset="100%" style="stop-color:#1a0f2e"/>
    </linearGradient>
    
    <!-- Title gradient -->
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="70%" style="stop-color:#f0f0ff"/>
    </linearGradient>
    
    <!-- Accent gradient (purple to pink) -->
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4318FF"/>
      <stop offset="100%" style="stop-color:#E1306C"/>
    </linearGradient>
    
    <!-- Glow filter for logo -->
    <filter id="logoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Glow filter for text -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Subtle glow for elements -->
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ============ BACKGROUND ============ -->
  <rect width="1280" height="640" fill="url(#bgGrad)"/>
  
  <!-- Accent line top -->
  <rect x="0" y="0" width="1280" height="4" fill="url(#accentGrad)"/>
  
  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="213" y1="0" x2="213" y2="640"/>
    <line x1="426" y1="0" x2="426" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="853" y1="0" x2="853" y2="640"/>
    <line x1="1066" y1="0" x2="1066" y2="640"/>
  </g>
  
  <!-- Glow blobs (decorative) -->
  <circle cx="150" cy="320" r="250" fill="#4318FF" opacity="0.08"/>
  <circle cx="1150" cy="200" r="200" fill="#E1306C" opacity="0.06"/>
  <circle cx="700" cy="550" r="180" fill="#7b5cff" opacity="0.05"/>

  <!-- ============ MAIN CONTENT AREA ============ -->
  
  <!-- Logo (left side, scaled up) -->
  <g transform="translate(120, 180) scale(3.2)" filter="url(#logoGlow)">
    <mask id="eye-mask-v2">
      <rect x="0" y="0" width="100" height="80" fill="white"/>
      <circle cx="18" cy="40" r="4" fill="black"/>
    </mask>
    <g mask="url(#eye-mask-v2)" fill="#4318FF">
      <rect x="0" y="0" width="45" height="80" rx="22.5"/>
      <path d="M55 36V0H100C100 0 100 36 55 36Z"/>
      <path d="M55 44V80H100C100 80 100 44 55 44Z"/>
    </g>
  </g>
  
  <!-- Main Title -->
  <text x="480" y="285" 
        font-family="'Segoe UI', 'SF Pro Display', -apple-system, system-ui, sans-serif"
        font-size="96" 
        font-weight="700" 
        fill="url(#titleGrad)" 
        letter-spacing="-3"
        filter="url(#textGlow)">
    Kroom<tspan fill="#4318FF">Drive</tspan>
  </text>
  
  <!-- Subtitle -->
  <text x="482" y="350" 
        font-family="'Segoe UI', system-ui, sans-serif"
        font-size="28" 
        font-weight="400" 
        fill="rgba(255,255,255,0.60)" 
        letter-spacing="0.5">
    Self-hosted File Manager via SSH/SFTP
  </text>

  <!-- ============ FEATURE PILLS (Bottom left) ============ -->
  <g transform="translate(480, 420)">
    <!-- Row 1: Main features -->
    <!-- SSH/SFTP -->
    <g>
      <rect x="0" y="0" width="130" height="40" rx="20" fill="#4318FF" opacity="0.22"/>
      <rect x="0" y="0" width="130" height="40" rx="20" stroke="#4318FF" stroke-width="1.5" fill="none"/>
      <text x="65" y="26" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600"
            fill="#a78bff" text-anchor="middle" letter-spacing="0.4">SSH / SFTP</text>
    </g>
    
    <!-- Multi-User -->
    <g transform="translate(145, 0)">
      <rect x="0" y="0" width="120" height="40" rx="20" fill="#4318FF" opacity="0.22"/>
      <rect x="0" y="0" width="120" height="40" rx="20" stroke="#4318FF" stroke-width="1.5" fill="none"/>
      <text x="60" y="26" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600"
            fill="#a78bff" text-anchor="middle" letter-spacing="0.4">Multi-User</text>
    </g>
    
    <!-- Git Panel -->
    <g transform="translate(280, 0)">
      <rect x="0" y="0" width="105" height="40" rx="20" fill="#4318FF" opacity="0.22"/>
      <rect x="0" y="0" width="105" height="40" rx="20" stroke="#4318FF" stroke-width="1.5" fill="none"/>
      <text x="52" y="26" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600"
            fill="#a78bff" text-anchor="middle" letter-spacing="0.4">Git Panel</text>
    </g>
    
    <!-- Cloudflare Tunnel -->
    <g transform="translate(400, 0)">
      <rect x="0" y="0" width="160" height="40" rx="20" fill="#f97316" opacity="0.18"/>
      <rect x="0" y="0" width="160" height="40" rx="20" stroke="#f97316" stroke-width="1.5" fill="none" opacity="0.7"/>
      <text x="80" y="26" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600"
            fill="#fdba74" text-anchor="middle" letter-spacing="0.4">CF Tunnel</text>
    </g>
    
    <!-- Row 2: Tech stack -->
    <g transform="translate(0, 55)">
      <!-- TypeScript -->
      <rect x="0" y="0" width="115" height="36" rx="18" fill="rgba(49,120,198,0.15)" stroke="rgba(49,120,198,0.5)" stroke-width="1"/>
      <text x="57" y="23" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="500"
            fill="#68a3d8" text-anchor="middle">TypeScript</text>
      
      <!-- Node.js -->
      <rect x="125" y="0" width="95" height="36" rx="18" fill="rgba(104,160,74,0.15)" stroke="rgba(104,160,74,0.5)" stroke-width="1"/>
      <text x="172" y="23" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="500"
            fill="#8cc84b" text-anchor="middle">Node.js</text>
      
      <!-- Python -->
      <rect x="230" y="0" width="85" height="36" rx="18" fill="rgba(55,118,171,0.15)" stroke="rgba(55,118,171,0.5)" stroke-width="1"/>
      <text x="272" y="23" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="500"
            fill="#6a9fd8" text-anchor="middle">Python</text>
    </g>
  </g>

  <!-- ============ RIGHT SIDE VISUAL (Simplified server illustration) ============ -->
  <g transform="translate(1020, 200)" opacity="0.4">
    <!-- Server rack representation -->
    <g filter="url(#softGlow)">
      <!-- Server 1 -->
      <rect x="0" y="0" width="180" height="45" rx="6" fill="none" stroke="#4318FF" stroke-width="2"/>
      <circle cx="15" cy="22" r="4" fill="#4318FF"/>
      <circle cx="30" cy="22" r="4" fill="#7b5cff"/>
      <line x1="50" y1="15" x2="140" y2="15" stroke="#4318FF" stroke-width="2" opacity="0.6"/>
      <line x1="50" y1="22" x2="110" y2="22" stroke="#4318FF" stroke-width="2" opacity="0.4"/>
      <line x1="50" y1="29" x2="125" y2="29" stroke="#4318FF" stroke-width="2" opacity="0.3"/>
      
      <!-- Server 2 -->
      <rect x="0" y="60" width="180" height="45" rx="6" fill="none" stroke="#7b5cff" stroke-width="2"/>
      <circle cx="15" cy="82" r="4" fill="#7b5cff"/>
      <circle cx="30" cy="82" r="4" fill="#4318FF"/>
      <line x1="50" y1="75" x2="130" y2="75" stroke="#7b5cff" stroke-width="2" opacity="0.6"/>
      <line x1="50" y1="82" x2="120" y2="82" stroke="#7b5cff" stroke-width="2" opacity="0.4"/>
      <line x1="50" y1="89" x2="105" y2="89" stroke="#7b5cff" stroke-width="2" opacity="0.3"/>
      
      <!-- Server 3 -->
      <rect x="0" y="120" width="180" height="45" rx="6" fill="none" stroke="#E1306C" stroke-width="2" opacity="0.7"/>
      <circle cx="15" cy="142" r="4" fill="#E1306C"/>
      <circle cx="30" cy="142" r="4" fill="#f97316"/>
      <line x1="50" y1="135" x2="145" y2="135" stroke="#E1306C" stroke-width="2" opacity="0.5"/>
      <line x1="50" y1="142" x2="115" y2="142" stroke="#E1306C" stroke-width="2" opacity="0.3"/>
      <line x1="50" y1="149" x2="135" y2="149" stroke="#E1306C" stroke-width="2" opacity="0.2"/>
    </g>
  </g>

  <!-- ============ BOTTOM BRANDING ============ -->
  <!-- GitHub star badge (bottom left) -->
  <g transform="translate(120, 580)">
    <rect x="0" y="0" width="140" height="32" rx="16" fill="rgba(67,24,255,0.12)" stroke="#4318FF" stroke-width="1"/>
    <text x="70" y="21" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="500"
          fill="#a78bff" text-anchor="middle">⭐ Open Source</text>
  </g>
  
  <!-- KroomBox branding (bottom right) -->
  <text x="1250" y="605" 
        font-family="'Segoe UI', sans-serif" 
        font-size="16"
        fill="rgba(255,255,255,0.35)" 
        text-anchor="end" 
        font-weight="500">
    by <tspan font-weight="600" fill="rgba(255,255,255,0.45)">KroomBox</tspan> · kroombox.com
  </text>
</svg>
